name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Extract project
        run: unzip TamilBibleAPK_with_icon.zip

      - name: Grant gradlew permission
        run: chmod +x TamilBibleAPK/gradlew

      - name: Build APK
        run: cd TamilBibleAPK && ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/*.apk"
